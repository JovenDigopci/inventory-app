services:
  db:
    image: mysql:8.4
    container_name: inventory-app-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: inventory_root_password
      MYSQL_DATABASE: inventory_app
    ports:
      - "3306:3306"
    volumes:
      - inventory_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pinventory_root_password"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  inventory_mysql_data:
